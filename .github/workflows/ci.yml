name: CI

on:
  push:
    paths:
      - '**'
  pull_request:
    paths:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli, zip, mbstring
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare CI app identity
        run: |
          PKG=com_pinoox_app
          sed -i "s/__PINX_PACKAGE__/${PKG}/g" app.php config/apps.config.php config/app-router.config.php .env.example
          sed -i 's/__PINX_DISPLAY_NAME__/Pinoox App/g' app.php .env.example
          sed -i 's/__PINX_DEVELOPER__/Pinoox/g' app.php
          sed -i 's/__PINX_DESCRIPTION__/Pinoox App — CI smoke test/g' app.php

      - name: Environment
        run: cp .env.example .env

      - name: Doctor
        run: php bin/pinx doctor --skip-db

      - name: Build pinx package
        run: php bin/pinx build --yes
        env:
          PINX_DEV: '1'
          PINX_PACKAGE: com_pinoox_app

      - name: Verify export artifact
        run: test -n "$(find export -maxdepth 1 -name '*.pinx' -print -quit)"
