name: CI

on:
  push:
    paths:
      - '**'
  pull_request:
    paths:
      - '**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mysqli, zip, mbstring
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Prepare CI app identity
        run: |
          PKG=com_pinoox_app
          NAME='Pinoox App'
          DEV='Pinoox'
          DESC='Pinoox App — CI smoke test'
          for key_val in \
            "__PINX_PACKAGE__:${PKG}" \
            "__PINX_DISPLAY_NAME__:${NAME}" \
            "__PINX_DEVELOPER__:${DEV}" \
            "__PINX_DESCRIPTION__:${DESC}"; do
            key="${key_val%%:*}"
            val="${key_val#*:}"
            grep -rlF "$key" . \
              --include='*.php' \
              --include='.env.example' \
              --exclude-dir=vendor \
              --exclude-dir=pinker \
              --exclude-dir=export \
              --exclude-dir=node_modules \
              | xargs -r sed -i "s|${key}|${val}|g"
          done

      - name: Environment
        run: cp .env.example .env

      - name: Doctor
        run: php bin/pinx doctor --skip-db

      - name: Build pinx package
        run: php bin/pinx build --yes
        env:
          PINX_DEV: '1'
          PINX_PACKAGE: com_pinoox_app

      - name: Verify export artifact
        run: test -n "$(find export -maxdepth 1 -name '*.pinx' -print -quit)"
